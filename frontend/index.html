<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Corrector ortográfico inteligente con IA" />
    <title>Ortograf IA</title>
  </head>
  <body>
    <div id="app">
      <button class="sidebar__toggle-btn" id="sidebar-toggle-btn" type="button" aria-label="Abrir menú">☰</button>
      <div class="sidebar-overlay" id="sidebar-overlay"></div>
      
      <div class="ortograf-layout">
        <!-- SIDEBAR -->
        <aside class="sidebar">
          <header class="sidebar__header">
            <h1 class="sidebar__title">
              Ortograf <span class="sidebar__badge">IA</span>
            </h1>
            <button class="sidebar__profile-btn" id="profile-btn" aria-label="Perfil de usuario" type="button">
              <span id="profile-initial">?</span>
            </button>
          </header>
          <nav class="sidebar__nav" aria-label="Navegación de chats">
            <button class="sidebar__new-chat-btn" id="new-chat-btn" type="button">
              + Nuevo chat
            </button>
            <ul class="sidebar__history-list" id="chat-history-list" role="list">
              <!-- historial de chats pa despues -->
            </ul>
          </nav>
        </aside>

        <!-- CHAT -->
        <main class="chat">
          <!-- ÁREA DE MENSAJES -->
          <section class="chat__display" id="chat-display" aria-live="polite" aria-label="Conversación">
            <div class="chat__view-limit">
              <article class="chat__welcome" id="welcome-screen">
                <img class="chat__welcome-icon" src="./logo.png" alt="Logo de ortograf">
                <h2 class="chat__welcome-title">¿Qué vamos a escribir?</h2>
                <p class="chat__welcome-desc">
                  Ingresa un texto para analizar su ortografía.
                </p>
              </article>
              <div class="chat__messages" id="chat-messages" aria-label="Mensajes del chat"></div>
            </div>
          </section>

          <!-- TEXTO -->
          <footer class="chat__footer">
            <div class="editor" id="chat-editor">
              <div class="editor__wrapper">
                <div class="editor__highlight" id="editor-highlight"></div>
                <textarea
                  class="editor__input"
                  id="user-input"
                  placeholder="Escribe o pega tu texto aquí..."
                  rows="1"
                  aria-label="Campo de texto para corrección"
                  autocomplete="off"
                  spellcheck="false"
                ></textarea>
                <button
                  class="editor__send-btn"
                  id="send-btn"
                  type="button"
                  aria-label="Enviar texto"
                  disabled
                >
                  <img
                    class="editor__send-icon"
                    src="/src/assets/enviar.png"
                    alt=""
                    aria-hidden="true"
                  />
                </button>
              </div>
            </div>
          </footer>
        </main>
      </div>
      <!-- MODAL AUTH -->
      <div class="auth-overlay" id="auth-overlay" hidden>
        <div class="auth-modal" id="auth-modal" role="dialog" aria-modal="true" aria-labelledby="auth-title">

          <button class="auth-modal__close" id="auth-close-btn" type="button" aria-label="Cerrar">✕</button>

          <!-- Tabs -->
          <div class="auth-modal__tabs">
            <button class="auth-modal__tab auth-modal__tab--active" id="tab-login" type="button">
              Iniciar sesión
            </button>
            <button class="auth-modal__tab" id="tab-register" type="button">
              Registrarse
            </button>
          </div>

          <!-- Login -->
          <div class="auth-modal__form" id="form-login">
            <h2 class="auth-modal__title" id="auth-title">Bienvenido de nuevo</h2>
            <p class="auth-modal__desc">Inicia sesión para guardar tu historial</p>
            <div class="auth-modal__field">
              <label for="login-email">Correo electrónico</label>
              <input type="email" id="login-email" placeholder="tu@correo.com" autocomplete="email" />
            </div>
            <div class="auth-modal__field">
              <label for="login-password">Contraseña</label>
              <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
            </div>
            <p class="auth-modal__error" id="login-error" hidden></p>
            <button class="auth-modal__submit" id="login-submit" type="button">
              Iniciar sesión
            </button>
            <button class="auth-modal__link" id="forgot-btn" type="button">
              ¿Olvidaste tu contraseña?
            </button>
          </div>

          <!-- Register -->
          <div class="auth-modal__form" id="form-register" hidden>
            <h2 class="auth-modal__title">Crea tu cuenta</h2>
            <p class="auth-modal__desc">Guarda tu historial y accede desde cualquier lugar</p>
            <div class="auth-modal__field">
              <label for="register-name">Nombre</label>
              <input type="text" id="register-name" placeholder="Tu nombre" autocomplete="name" />
            </div>
            <div class="auth-modal__field">
              <label for="register-email">Correo electrónico</label>
              <input type="email" id="register-email" placeholder="tu@correo.com" autocomplete="email" />
            </div>
            <div class="auth-modal__field">
              <label for="register-password">Contraseña</label>
              <input type="password" id="register-password" placeholder="••••••••" autocomplete="new-password" />
            </div>
            <p class="auth-modal__error" id="register-error" hidden></p>
            <button class="auth-modal__submit" id="register-submit" type="button">
              Crear cuenta
            </button>
          </div>

          <!-- Recuperar contraseña -->
          <div class="auth-modal__form" id="form-forgot" hidden>
            <h2 class="auth-modal__title">Recuperar contraseña</h2>
            <p class="auth-modal__desc">Ingresa tu correo y tu nueva contraseña</p>
            <div class="auth-modal__field">
              <label for="forgot-email">Correo electrónico</label>
              <input type="email" id="forgot-email" placeholder="tu@correo.com" autocomplete="email" />
            </div>
            <div class="auth-modal__field">
              <label for="forgot-password">Nueva contraseña</label>
              <input type="password" id="forgot-password" placeholder="••••••••" autocomplete="new-password" />
            </div>
            <div class="auth-modal__field">
              <label for="forgot-password2">Confirmar contraseña</label>
              <input type="password" id="forgot-password2" placeholder="••••••••" />
            </div>
            <p class="auth-modal__error" id="forgot-error" hidden></p>
            <button class="auth-modal__submit" id="forgot-submit" type="button">
              Cambiar contraseña
            </button>
            <button class="auth-modal__link" id="back-to-login" type="button">
              ← Volver al login
            </button>
          </div>
        </div>
      </div>

      </div>
    </div>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
